<div class="container">
    <h1>Mantenimiento de Mascotas</h1>
    <div class="card">
        <div class="card-body">
            <div class="card" style="width: 50rem;">
                <div class="card-body">
                    <h5 class="card-title">Datos de la mascota</h5>
                    <!--form>-->
                        <input type="hidden" id="id-mascota"[(ngModel)]="mascota.id">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" aria-describedby="nomHelp" [(ngModel)]="mascota.nombre">
                            <div id="nomHelp" class="form-text">Ingrese el nombre de la mascota</div>
                        </div>
                        <div class="mb-3">
                            <label for="edad" class="form-label">Edad</label>
                            <input type="number" class="form-control" id="edad" aria-describedby="edadHelp" [(ngModel)]="mascota.edad">
                            <div id="edadHelp" class="form-text">Ingrese la edad de la mascota</div>
                        </div>
                        <button type="button" class="btn btn-success" [(ngModel)]="enEdicion" (click)="guardarMascota()">
                         {{ enEdicion ? 'Editar' : 'Guardar' }}
                        </button>
                    <!--/form-->
                    <h2>Lista de Mascotas</h2>
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Nombre</th>
                                <th scope="col">Edad</th>
                                <th scope="col">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            @for (mascota of mascotas; track mascota.id) {
                                <tr>
                                    <th scope="row">{{mascota.id}}</th>
                                    <td>{{mascota.nombre}}</td>
                                    <td>{{mascota.edad}}</td>
                                    <td>
                                        <button class="btn btn-primary btn-sm" style="margin-right: 10px;" (click)="actualizarMascota(mascota)" >
                                            Editar
                                        </button>
                                        <button class="btn btn-danger btn-sm" (click)="eliminarMascota(mascota.id)">
                                            Eliminar
                                        </button>
                                    </td>                                  
                                </tr>
                            }
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>
